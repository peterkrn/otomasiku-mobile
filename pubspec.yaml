name: otomasiku_mobile
description: "Otomasiku Marketplace - B2B Industrial Automation"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # i18n
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.0

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Forms
  flutter_form_builder: ^10.3.0+2

  # Typography
  google_fonts: ^6.2.1

  # HTTP client (BCA Sandbox only for M2)
  dio: ^5.4.3

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true  # Enable ARB codegen for i18n

  assets:
    - assets/
    - assets/images/
    - assets/images/products/
